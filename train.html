<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>8 Things to Improve</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .title {
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 15px;
      text-align: center;
      color: #333;
    }

    .item {
      padding: 12px;
      border-radius: 12px;
      margin: 10px 0;
      color: white;
    }

    .en {
      font-weight: bold;
    }

    .am {
      font-size: 14px;
      opacity: 0.9;
    }

    .c1 { background: #ff6b6b; }
    .c2 { background: #feca57; color: black; }
    .c3 { background: #48dbfb; color: black; }
    .c4 { background: #1dd1a1; }
    .c5 { background: #5f27cd; }
    .c6 { background: #ff9ff3; color: black; }
    .c7 { background: #54a0ff; }
    .c8 { background: #00d2d3; color: black; }

  </style>
</head>
<body>

<div class="card">
  <div class="title">🔥 8 Things to Improve / ማሻሻል ያለባቸው 8 ነገሮች</div>

  <div class="item c1">
    <div class="en">1. Self-confidence</div>
    <div class="am">1. ራስ እምነት</div>
  </div>

  <div class="item c2">
    <div class="en">2. Time management</div>
    <div class="am">2. ጊዜ አስተዳደር</div>
  </div>

  <div class="item c3">
    <div class="en">3. Communication skills</div>
    <div class="am">3. የመግባባት ችሎታ</div>
  </div>

  <div class="item c4">
    <div class="en">4. Discipline</div>
    <div class="am">4. ዲሲፕሊን</div>
  </div>

  <div class="item c1">
  <div class="en">5. Persuasion skill</div>
  <div class="am">5. ሰዎችን የማስመን ጥበብ</div>
</div>

  <div class="item c6">
    <div class="en">6. Hard work</div>
    <div class="am">6. ትጋት</div>
  </div>

  <div class="item c7">
    <div class="en">7. Focus</div>
    <div class="am">7. ትኩረት</div>
  </div>

  <div class="item c8">
    <div class="en">8. Patience</div>
    <div class="am">8. ትዕግስት</div>
  </div>

</div>

</body>
</html>
